        <h4 id="paddlex图像分类预测并保存结果"><a href="#paddlex图像分类预测并保存结果" class="headerlink" title="paddlex图像分类预测并保存结果"></a>paddlex图像分类预测并保存结果</h4><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br></pre></td><td class="code"><pre><span class="line">import paddlex as pdx</span><br><span class="line">import os</span><br><span class="line"></span><br><span class="line">os.environ[&apos;CPU_NUM&apos;]=&apos;3&apos;</span><br><span class="line">model = pdx.load_model(&apos;output/resnet50_vd_ssld/best_model&apos;)</span><br><span class="line">image_dir=&apos;vegetables_cls/&apos;</span><br><span class="line"></span><br><span class="line">class_list = [os.path.join(image_dir, c) for c in os.listdir(image_dir) if os.path.isdir(os.path.join(image_dir, c))]</span><br><span class="line">class_list.sort()</span><br><span class="line">print(class_list)</span><br><span class="line"></span><br><span class="line">import random</span><br><span class="line">import matplotlib.pyplot as plt</span><br><span class="line"># 在我的 notebook 里，要设置下面两行才能显示中文</span><br><span class="line">plt.rcParams[&apos;font.family&apos;] = [&apos;sans-serif&apos;]</span><br><span class="line"># 如果是在 PyCharm 里，只要下面一行，上面的一行可以删除</span><br><span class="line">plt.rcParams[&apos;font.sans-serif&apos;] = [&apos;SimHei&apos;]</span><br><span class="line"></span><br><span class="line">import uuid</span><br><span class="line">print(random.random())</span><br><span class="line"></span><br><span class="line">result_dir=&apos;result&apos;</span><br><span class="line">try:</span><br><span class="line">    os.makedirs(result_dir)</span><br><span class="line">except:</span><br><span class="line">    print(&apos;exists&apos;)</span><br><span class="line">for subdir in class_list:</span><br><span class="line">    </span><br><span class="line">    for fn in os.listdir(subdir):</span><br><span class="line">        if random.random()&gt;0.98:</span><br><span class="line">            print(fn)</span><br><span class="line">            test_jpg = subdir+&apos;/&apos;+fn</span><br><span class="line">            print(test_jpg)</span><br><span class="line">            result = model.predict(test_jpg)</span><br><span class="line">            print(&quot;Predict Result:&quot;, result)</span><br><span class="line"></span><br><span class="line">            img=plt.imread(test_jpg)</span><br><span class="line">            #print(img.shape)</span><br><span class="line">            plt.title(str(result[0][&apos;category&apos;])+&apos; 的概率是:&apos;+str(result[0][&apos;score&apos;]),fontsize=24)</span><br><span class="line">##            plt.text(0, 20, str(result[0][&apos;score&apos;]))</span><br><span class="line">            plt.imshow(img)</span><br><span class="line">            fpath,filename=os.path.split(test_jpg)</span><br><span class="line">            #print(filename)</span><br><span class="line">            plt.savefig(result_dir+&apos;/&apos;+str(uuid.uuid4())+filename)</span><br><span class="line">        # plt.show()</span><br></pre></td></tr></table></figure>
