4; rv:16.0.1) Gecko/20121011 Firefox/16.0.1&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.1; WOW64; Trident/6.0; SLCC2; .NET CLR 2.0.50727; .NET CLR 3.5.30729; .NET CLR 3.0.30729; Media Center PC 6.0; InfoPath.2; .NET4.0C; .NET4.0E)&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.1; WOW64; Trident/6.0; SLCC2; .NET CLR 2.0.50727; .NET CLR 3.5.30729; .NET CLR 3.0.30729; Media Center PC 6.0; InfoPath.2; .NET4.0C; .NET4.0E; QQBrowser/7.3.9825.400)&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.1; WOW64; Trident/6.0; BIDUBrowser 2.x)&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows; U; Windows NT 5.1) Gecko/20070309 Firefox/2.0.0.3&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows; U; Windows NT 5.1) Gecko/20070803 Firefox/1.5.0.12&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows; U; Windows NT 5.2) Gecko/2008070208 Firefox/3.0.1&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows; U; Windows NT 5.1; en-US; rv:1.8.1.12) Gecko/20080219 Firefox/2.0.0.12 Navigator/9.0.0.6&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows NT 5.1) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/28.0.1500.95 Safari/537.36&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows NT 6.1; WOW64; Trident/7.0; SLCC2; .NET CLR 2.0.50727; .NET CLR 3.5.30729; .NET CLR 3.0.30729; Media Center PC 6.0; .NET4.0C; rv:11.0) like Gecko)&apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows NT 6.1; WOW64; rv:21.0) Gecko/20100101 Firefox/21.0 &apos;,</span><br><span class="line">                       &apos;Mozilla/5.0 (Windows NT 6.1; WOW64) AppleWebKit/537.1 (KHTML, like Gecko        url=&quot;http://top.baidu.com/buzz?b=&quot;+str(msg_id),</span><br><span class="line">        headers=random_header(),</span><br><span class="line">    )</span><br><span class="line">    response.encoding = response.apparent_encoding</span><br><span class="line">    ##print(ret.text)</span><br><span class="line"></span><br><span class="line">    soup = BeautifulSoup(response.text, &apos;html.parser&apos;)</span><br><span class="line">    ##print(soup.prettify())</span><br><span class="line">    print(soup.title.text)</span><br><span class="line">    divs = soup.find_all(&apos;a&apos;,attrs=&#123;&quot;class&quot;:&quot;list-title&quot;&#125;)</span><br><span class="line">    print(&apos;num:&apos;,len(divs))</span><br><span class="line">    i=1</span><br><span class="line">    for div in divs:</span><br><span class="line">#         print(i,div.text)</span><br><span class="line">        yield div.text</span><br><span class="line">        i=i+1</span><br><span class="line">    ##</span><br><span class="line">    ##div = soup.find(name=&apos;div&apos;, attrs=&#123;&quot;class&quot;:&quot;HotList-itemTitle&quot;&#125;)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"> </span><br><span class="line">if __name__ == &quot;__main__&quot;:</span><br><span class="line">    senta = hub.Module(name=&quot;senta_bilstm&quot;)</span><br><span class="line">    input_dict = &#123;&quot;text&quot;: list(get_baidu_billboard(1))&#125;</span><br><span class="line">    results = senta.sentiment_classify(data=input_dict)</span><br><span class="line"></span><br><span class="line">    # for result in results:</span><br><span class="line">    #     print(result)</span><br><span class="line">    # print(results)</span><br><span class="line"></span><br><span class="line">    df=pd.DataFrame(results)</span><br><span class="line">    print(df.mean())</span><br><span class="line">    print(df)</span><br><span class="line">    # print(df.describe())</span><br><span class="line"></span><br><span class="line">##    for msg in list(get_baidu_billboard(1)):</span><br><span class="line">##        print(msg)</span><br><span class="line">##    print(random_header())</span><br><span class="line">        </span><br><span class="line">##    main()</span><br></pre></td></tr></table></figure>
