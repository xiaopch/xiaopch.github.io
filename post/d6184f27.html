><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br></pre></td><td class="code"><pre><span class="line"># -*- coding: cp936 -*-</span><br><span class="line">import pycurl</span><br><span class="line">from StringIO import StringIO</span><br><span class="line">import pandas as pd</span><br><span class="line">import requests</span><br><span class="line">import json</span><br><span class="line"></span><br><span class="line">root_url=&apos;http://abc:123456@120.0.0.2:8000&apos;</span><br><span class="line"></span><br><span class="line">def curl_pub(url,command,header=[&apos;Content-Type:application/json&apos;]):</span><br><span class="line">    sio = StringIO() </span><br><span class="line">    c = pycurl.Curl() </span><br><span class="line">    c.setopt(pycurl.URL,url) </span><br><span class="line">    c.setopt(pycurl.HTTPHEADER,header) </span><br><span class="line">    c.setopt(pycurl.CUSTOMREQUEST,command)          </span><br><span class="line">    c.setopt(pycurl.WRITEFUNCTION, sio.write) </span><br><span class="line">    c.setopt(pycurl.FOLLOWLOCATION, 1) </span><br><span class="line">    c.setopt(pycurl.MAXREDIRS, 5) </span><br><span class="line">    c.perform() </span><br><span class="line">    status = c.getinfo(c.HTTP_CODE) </span><br><span class="line">    data = sio.getvalue()</span><br><span class="line">    print(status)</span><br><span class="line">    sio.close()</span><br><span class="line">    return data</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">def curl_insert_json(url,json_str):</span><br><span class="line">##    json_str=&apos;&#123;&quot;Name&quot;:&quot;xiaopch&quot;,&quot;age&quot;:&quot;999&quot;&#125;&apos;</span><br><span class="line">    b = StringIO() </span><br><span class="line">    c = pycurl.Curl() </span><br><span class="line">##    print(json_str)</span><br><span class="line">    c.setopt(pycurl.URL,url)</span><br><span class="line">    c.setopt(pycurl.HTTPHEADER,[&apos;Content-Type:application/json&apos;,&apos;Content-Length:&apos;+str(len(json_str))]) </span><br><span class="line">    c.setopt(pycurl.CUSTOMREQUEST,&apos;PUT&apos;)</span><br><span class="line">    c.setopt(pycurl.POSTFIELDS,json_str)         </span><br><span class="line">    c.setopt(pycurl.WRITEFUNCTION, b.write) </span><br><span class="line">    c.setopt(pycurl.FOLLOWLOCATION, 1) </span><br><span class="line">    c.setopt(pycurl.MAXREDIRS, 5) </span><br><span class="line">    c.perform() </span><br><span class="line">    status = c.getinfo(c.HTTP_CODE) </span><br><span class="line">    data = b.getvalue()</span><br><span class="line">    print(status)</span><br><span class="line">    b.close()</span><br><span class="line">    return data</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">def curl_upload(url,filename,header):</span><br><span class="line">    b = StringIO()</span><br><span class="line">    c = pycurl.Curl()</span><br><span class="line">    c.setopt(c.URL, url)</span><br><span class="line">    c.setopt(c.UPLOAD, 1)</span><br><span class="line">    c.setopt(pycurl.HTTPHEADER,header) </span><br><span class="line">    file = open(filename,&apos;rb&apos;)</span><br><span class="line">    c.setopt(c.READDATA, file)</span><br><span class="line">    c.setopt(pycurl.WRITEFUNCTION, b.write) </span><br><span class="line">    c.perform()</span><br><span class="line">    c.close()</span><br><span class="line">    # File must be kept open while Curl object is using it</span><br><span class="line">    file.close()</span><br><span class="line">    data = b.getvalue()</span><br><span class="line">    b.close()</span><br><span class="line">    return data</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">def download_csv_to_df(url):</span><br><span class="line">    res = requests.get(url)</span><br><span class="line">    res.encoding = &apos;utf-8&apos; #需要添加这一行，告知html文件解码方式</span><br><span class="line">    res.raise_for_status()</span><br><span class="line">    ##print(res.text)</span><br><span class="line">    sio = StringIO()</span><br><span class="line">    sio.write(res.text)</span><br><span class="line">    sio.seek(0)</span><br><span class="line">    df=pd.read_csv(sio,encoding=&apos;utf-8&apos;)</span><br><span class="line">    return df</span><br><span class="line">    </span><br><span class="line">if __name__==&apos;__main__&apos;:</span><br><span class="line">##    ##创建数据库</span><br><span class="line">##    print(curl_pub(root_url+&apos;/test&apos;,&apos;PUT&apos;))</span><br><span class="line">##    ##显示所有数据库</span><br><span class="line">    print(curl_pub(root_url+&apos;/_all_dbs&apos;,&apos;GET&apos;))</span><br><span class="line">##</span><br><span class="line">##    ##删除数据库</span><br><span class="line">##    print(curl_pub(root_url+&apos;/route&apos;,&apos;DELETE&apos;))</span><br><span class="line">##    ##显示数据库所有记录</span><br><span class="line">##    print(curl_pub(root_url+&apos;/_all_dbs&apos;,&apos;GET&apos;))</span><br><span class="line"></span><br><span class="line">    </span><br><span class="line"></span><br><span class="line">##    ##显示所有数据库某一记录</span><br><span class="line">##    print(curl_pub(root_url+&apos;/gis/df_red_state_points&apos;,&apos;GET&apos;))</span><br><span class="line">    </span><br><span class="line">    ##插入一条记录</span><br><span class="line">##    print(curl_insert_json(root_url+&apos;/test/er&apos;,&apos;&#123;&quot;Name&quot;:&quot;xiaopch&quot;,&quot;age&quot;:&quot;999&quot;&#125;&apos;))</span><br><span class="line"></span><br><span class="line">    ##上传文件</span><br><span class="line">##    print(curl_upload(root_url+&apos;/test/atwork/atwork.jpg&apos;,&apos;atwork.jpg&apos;,[&apos;Content-Type:image/jpg&apos;]))</span><br><span class="line">##    print(curl_upload(root_url+&apos;/test/20191108a/inspection_data_for_gis2.csv&apos;,&apos;inspection_data_for_gis.csv&apos;,[&apos;Content-Type:text/plain&apos;]))</span><br><span class="line">##</span><br><span class="line">##    ##下载文件</span><br><span class="line">##    with open(&apos;download.csv&apos;,&apos;wb&apos;) as f:</span><br><span class="line">##        f.write(curl_pub(root_url+&apos;/test/20191108a/inspection_data_for_gis2.csv&apos;,&apos;GET&apos;))</span><br><span class="line"></span><br><span class="line">    ##读取记录到pandas的dataframe    </span><br><span class="line">    print(download_csv_to_df(root_url+&apos;/test/20191108a/inspection_data_for_gis2.csv&apos;))</span><br><span class="line">        </span><br><span class="line">    </span><br><span class="line"></span><br><span class="line">##    download_csv_to_df()</span><br></pre></td></tr></table></figure>
