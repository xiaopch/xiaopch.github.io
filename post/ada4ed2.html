        <h3 id="安装依赖模块"><a href="#安装依赖模块" class="headerlink" title="安装依赖模块"></a>安装依赖模块</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">#由于PaddleHub升级比较快，建议大家直接升级到最新版本的PaddleHub，无需指定版本升级</span><br><span class="line">!pip install paddlehub --upgrade -i https://pypi.tuna.tsinghua.edu.cn/simple </span><br><span class="line">#该Module依赖于第三方库shapely、pyclipper，使用该Module之前，请先安装shapely、pyclipper</span><br><span class="line">!pip install shapely -i https://pypi.tuna.tsinghua.edu.cn/simple </span><br><span class="line">!pip install pyclipper -i https://pypi.tuna.tsinghua.edu.cn/simple</span><br></pre></td></tr></table></figure>
<h3 id="代码"><a href="#代码" class="headerlink" title="代码"></a>代码</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br></pre></td><td class="code"><pre><span class="line">import matplotlib.pyplot as plt </span><br><span class="line">import matplotlib.image as mpimg</span><br><span class="line"></span><br><span class="line">import os</span><br><span class="line">#收集当前目录下待预测的png图片</span><br><span class="line">test_img_path=[]</span><br><span class="line">for f in os.listdir(&apos;.&apos;):</span><br><span class="line">    if f.endswith(&apos;png&apos;):</span><br><span class="line">        print(f)</span><br><span class="line">        test_img_path.append(f)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">##test_img_path = [&quot;./carnum.png&quot;,  &quot;./id.png&quot;]</span><br><span class="line">##</span><br><span class="line"># 展示其中图片</span><br><span class="line">##img1 = mpimg.imread(test_img_path[1]) </span><br><span class="line">##plt.imshow(img1) </span><br><span class="line">##plt.axis(&apos;off&apos;) </span><br><span class="line">##plt.show()</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">import paddlehub as hub</span><br><span class="line"></span><br><span class="line"># 加载移动端预训练模型</span><br><span class="line">ocr = hub.Module(name=&quot;chinese_ocr_db_crnn_mobile&quot;)</span><br><span class="line"># 服务端可以加载大模型，效果更好 </span><br><span class="line"># ocr = hub.Module(name=&quot;chinese_ocr_db_crnn_server&quot;)</span><br><span class="line"></span><br><span class="line">import cv2</span><br><span class="line"></span><br><span class="line"># 读取测试文件夹test.txt中的照片路径</span><br><span class="line">np_images =[cv2.imread(image_path) for image_path in test_img_path] </span><br><span class="line"></span><br><span class="line">results = ocr.recognize_text(</span><br><span class="line">                    images=np_images,         # 图片数据，ndarray.shape 为 [H, W, C]，BGR格式；</span><br><span class="line">                    use_gpu=False,            # 是否使用 GPU；若使用GPU，请先设置CUDA_VISIBLE_DEVICES环境变量</span><br><span class="line">                    output_dir=&apos;ocr_result&apos;,  # 图片的保存路径，默认设为 ocr_result；</span><br><span class="line">                    visualization=True,       # 是否将识别结果保存为图片文件；</span><br><span class="line">                    box_thresh=0.5,           # 检测文本框置信度的阈值；</span><br><span class="line">                    text_thresh=0.5)          # 识别中文文本置信度的阈值；</span><br><span class="line"></span><br><span class="line">for result in results:</span><br><span class="line">    data = result[&apos;data&apos;]</span><br><span class="line">    save_path = result[&apos;save_path&apos;]</span><br><span class="line">    for infomation in data:</span><br><span class="line">        print(&apos;text: &apos;, infomation[&apos;text&apos;], &apos;\nconfidence: &apos;, infomation[&apos;confidence&apos;], &apos;\ntext_box_position: &apos;, infomation[&apos;text_box_position&apos;])</span><br></pre></td></tr></table></figure>
