        <h3 id="安装pillow"><a href="#安装pillow" class="headerlink" title="安装pillow"></a>安装pillow</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">!pip install pillow</span><br></pre></td></tr></table></figure>
<h3 id="代码"><a href="#代码" class="headerlink" title="代码"></a>代码</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br></pre></td><td class="code"><pre><span class="line">&apos;&apos;&apos;## 导入模块&apos;&apos;&apos;</span><br><span class="line">#图片处理</span><br><span class="line">from PIL import Image</span><br><span class="line">from PIL import ImageFilter</span><br><span class="line">from PIL import ImageEnhance</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;matplotlib显示PIL读取的图片&apos;&apos;&apos;</span><br><span class="line">import matplotlib.pyplot as plt</span><br><span class="line">def matplotlib_show(_img):</span><br><span class="line">    #显示旋转后的图片</span><br><span class="line">    plt.imshow(_img)  </span><br><span class="line">    plt.show()</span><br><span class="line"></span><br><span class="line">img_name=&apos;bird.jpg&apos;</span><br><span class="line">img_name_pre=img_name.split(&apos;.&apos;)[0]</span><br><span class="line"></span><br><span class="line">img = Image.open(img_name)</span><br><span class="line">&apos;&apos;&apos; 输出图片基本信息&apos;&apos;&apos;</span><br><span class="line">print(img.format)		 </span><br><span class="line">print(img.mode)</span><br><span class="line">print(img.size)</span><br><span class="line">&apos;&apos;&apos;显示图片&apos;&apos;&apos;</span><br><span class="line">img.show()</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos; 调整尺寸&apos;&apos;&apos;</span><br><span class="line">img_resize = img.resize((256,256))</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;保存处理后的图片&apos;&apos;&apos;</span><br><span class="line">img_resize.save(img_name_pre+&quot;_resize.jpg&quot;)</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;# 旋转&apos;&apos;&apos;</span><br><span class="line">img_rotate = img.rotate(45)         </span><br><span class="line">img_rotate.save(img_name_pre+&quot;_rotate.jpg&quot;)</span><br><span class="line">&apos;&apos;&apos;# 灰度处理&apos;&apos;&apos;</span><br><span class="line">om=img.convert(&apos;L&apos;)				</span><br><span class="line">om.save(img_name_pre+&apos;_gray.jpg&apos;)</span><br><span class="line">&apos;&apos;&apos;# 图片的轮廓&apos;&apos;&apos;</span><br><span class="line">om = img.filter(ImageFilter.CONTOUR)		</span><br><span class="line">om.save(img_name_pre+&apos;_contour.jpg&apos;)</span><br><span class="line">&apos;&apos;&apos;# 对比度为初始的10倍&apos;&apos;&apos;</span><br><span class="line">om = ImageEnhance.Contrast(img).enhance(10)		</span><br><span class="line">om.save(img_name_pre+&apos;_encontrast.jpg&apos;)</span><br><span class="line">&apos;&apos;&apos;###更改图片格式&apos;&apos;&apos;</span><br><span class="line">Image.open(img_name).save(img_name_pre+&apos;.jpg&apos;)</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;创建缩略图&apos;&apos;&apos;</span><br><span class="line">try:</span><br><span class="line">    size = (128, 128)</span><br><span class="line">    im = Image.open(img_name)</span><br><span class="line">    im.thumbnail(size,Image.ANTIALIAS)</span><br><span class="line">    im.save(img_name_pre+&apos;_thumbnail.jpg&apos;, &quot;JPEG&quot;)</span><br><span class="line">except IOError:</span><br><span class="line">    print(&quot;cannot create thumbnail for&quot;, img_name)</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;##从图片中复制子图像&apos;&apos;&apos;</span><br><span class="line">box = img.copy() #直接复制图像</span><br><span class="line">box = (300, 300, 800, 800)</span><br><span class="line">region = img.crop(box)</span><br><span class="line">region.show()</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;##分离和合并通道&apos;&apos;&apos;</span><br><span class="line">r, g, b = img.split()</span><br><span class="line">img = Image.merge(&quot;RGB&quot;, (b, g, r))</span><br><span class="line">&apos;&apos;&apos;</span><br><span class="line">#剪切</span><br><span class="line">crop()四个参数分别是：(左上角点的x坐标，左上角点的y坐标，右下角点的x坐标，右下角点的y坐标)</span><br><span class="line">&apos;&apos;&apos;</span><br><span class="line">img_crop_result = img.crop((126,0,381,249))</span><br><span class="line"></span><br><span class="line">&apos;&apos;&apos;[置换图像]&apos;&apos;&apos;</span><br><span class="line">&apos;&apos;&apos;#左右对换&apos;&apos;&apos;</span><br><span class="line">out = img.transpose(Image.FLIP_LEFT_RIGHT)</span><br><span class="line">matplotlib_show(out)</span><br><span class="line">out = img.transpose(Image.FLIP_TOP_BOTTOM)</span><br><span class="line">matplotlib_show(out)</span><br><span class="line">out = img.transpose(Image.ROTATE_90)</span><br><span class="line">matplotlib_show(out)</span><br><span class="line"></span><br><span class="line">out = img.transpose(Image.ROTATE_180)</span><br><span class="line">matplotlib_show(out)</span><br><span class="line"></span><br><span class="line">out = img.transpose(Image.ROTATE_270)</span><br><span class="line">matplotlib_show(out)</span><br></pre></td></tr></table></figure>
