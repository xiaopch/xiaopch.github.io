<h3 id="代码"><a href="#代码" class="headerlink" title="代码"></a>代码</h3><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">import cv2</span><br><span class="line"> </span><br><span class="line">cap = cv2.VideoCapture(1)</span><br><span class="line">fourcc = cv2.VideoWriter_fourcc(*&apos;XVID&apos;)</span><br><span class="line"># fps = cap.get(cv2.CAP_PROP_FPS)</span><br><span class="line">size = (int(cap.get(cv2.CAP_PROP_FRAME_WIDTH)), int(cap.get(cv2.CAP_PROP_FRAME_HEIGHT)))</span><br><span class="line">out = cv2.VideoWriter(&apos;camera_test.avi&apos;, fourcc,10.0, size)</span><br><span class="line">while True:</span><br><span class="line">    ret, frame = cap.read()</span><br><span class="line">    # 横向翻转</span><br><span class="line">    frame = cv2.flip(frame, 1)</span><br><span class="line">    out.write(frame)</span><br><span class="line">    # 在图像上显示 Press Q to save and quit</span><br><span class="line">    cv2.putText(frame,</span><br><span class="line">                &quot;Press Q to save and quit&quot;,</span><br><span class="line">                (10, 30), cv2.FONT_HERSHEY_SIMPLEX, 0.8,</span><br><span class="line">                (0, 255, 0), 2)</span><br><span class="line">    cv2.imshow(&apos;frame&apos;, frame)</span><br><span class="line"> </span><br><span class="line">    if cv2.waitKey(1) &amp; 0xFF == ord(&apos;q&apos;):</span><br><span class="line">        break</span><br><span class="line"> </span><br><span class="line">cap.release()</span><br><span class="line">out.release()</span><br><span class="line">cv2.destroyAllWindows()</span><br></pre></td></tr></table></figure>
