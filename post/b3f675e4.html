n class="string">'word='</span> + key_word + <span class="string">'&amp;pn='</span> + str_pn + <span class="string">'&amp;gsm='</span> + str_gsm + <span class="string">'&amp;ct=&amp;ic=0&amp;lm=-1&amp;width=0&amp;height=0'</span></span><br><span class="line">        print(<span class="string">'正在下载 %s 的第 %d 张图片.....'</span> % (key_word, download_sum))</span><br><span class="line">        <span class="keyword">try</span>:</span><br><span class="line">            <span class="comment"># 获取当前页面的源码</span></span><br><span class="line">            result = requests.get(url, timeout=<span class="number">30</span>).text</span><br><span class="line">            <span class="comment"># 获取当前页面的图片URL</span></span><br><span class="line">            img_urls = re.findall(<span class="string">'"objURL":"(.*?)",'</span>, result, re.S)</span><br><span class="line">            <span class="keyword">if</span> len(img_urls) &lt; <span class="number">1</span>:</span><br><span class="line">                <span class="keyword">break</span></span><br><span class="line">            <span class="comment"># 把这些图片URL一个个下载</span></span><br><span class="line">            <span class="keyword">for</span> img_url <span class="keyword">in</span> img_urls:</span><br><span class="line">                <span class="comment"># 获取图片内容</span></span><br><span class="line">                img = requests.get(img_url, timeout=<span class="number">30</span>)</span><br><span class="line">                img_name = save_path + <span class="string">'/'</span> + str(uuid.uuid1()) + <span class="string">'.jpg'</span></span><br><span class="line">                <span class="comment"># 保存图片</span></span><br><span class="line">                <span class="keyword">with</span> open(img_name, <span class="string">'wb'</span>) <span class="keyword">as</span> f:</span><br><span class="line">                    f.write(img.content)</span><br><span class="line">                <span class="keyword">with</span> open(<span class="string">'image_url_list.txt'</span>, <span class="string">'a+'</span>, encoding=<span class="string">'utf-8'</span>) <span class="keyword">as</span> f:</span><br><span class="line">                    f.write(img_name + <span class="string">'\t'</span> + img_url + <span class="string">'\n'</span>)</span><br><span class="line">                download_sum += <span class="number">1</span></span><br><span class="line">                <span class="keyword">if</span> download_sum &gt;= download_max:</span><br><span class="line">                    <span class="keyword">break</span></span><br><span class="line">        <span class="keyword">except</span> Exception <span class="keyword">as</span> e:</span><br><span class="line">            print(<span class="string">'【错误】当前图片无法下载，%s'</span> % e)</span><br><span class="line">            download_sum += <span class="number">1</span></span><br><span class="line">            <span class="keyword">continue</span></span><br><span class="line">    print(<span class="string">'下载完成'</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#开始下载图片</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">main</span><span class="params">()</span>:</span></span><br><span class="line">    <span class="comment"># 最大图片下载数量</span></span><br><span class="line">    max_sum = <span class="number">300</span></span><br><span class="line"><span class="comment">##    image_keywords_list=['桔子','苹果','梨子','香蕉','火龙果','葡萄','橙子','荔枝']</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">for</span> item <span class="keyword">in</span> image_keywords_list:</span><br><span class="line">        print(item)</span><br><span class="line">        <span class="comment"># 获取明星的名字</span></span><br><span class="line">        <span class="comment"># key_word = str(input('please input yourename: '))</span></span><br><span class="line">        <span class="comment"># 使用明星的名字开始下载图片</span></span><br><span class="line">        download_image(item, max_sum)</span><br><span class="line">        print(<span class="string">'全部图片以下载完成'</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__==<span class="string">'__main__'</span>:</span><br><span class="line">    main()</span><br><span class="line"><span class="comment">##    delete_invalid_files()</span></span><br><span class="line"><span class="comment">##    resize_files()</span></span><br></pre></td></tr></table></figure>
