        <h2 id="python最小二乘法拟合圆"><a href="#python最小二乘法拟合圆" class="headerlink" title="python最小二乘法拟合圆"></a>python最小二乘法拟合圆</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br></pre></td><td class="code"><pre><span class="line">#! /usr/bin/env python</span><br><span class="line"># -*- coding: utf-8 -*-</span><br><span class="line"></span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line">This program is debugged by Harden Qiu</span><br><span class="line">&quot;&quot;&quot;</span><br><span class="line"></span><br><span class="line">from numpy import *</span><br><span class="line">from scipy import optimize</span><br><span class="line">import functools</span><br><span class="line">from matplotlib import pyplot as p, cm, colors</span><br><span class="line">import pandas as pd</span><br><span class="line">method_2  = &quot;Fitting Circle&quot;</span><br><span class="line"></span><br><span class="line">df=pd.read_csv(&apos;profile_circle.csv&apos;)</span><br><span class="line"></span><br><span class="line"># Coordinates of the 2D points</span><br><span class="line">x = df[&apos;x&apos;]</span><br><span class="line">#x = r_[36, 36, 19, 18, 33, 26]</span><br><span class="line">y = df[&apos;z&apos;]</span><br><span class="line">#y = r_[14, 10, 28, 31, 18, 26]</span><br><span class="line">print(df)</span><br><span class="line">basename = &apos;arc&apos;</span><br><span class="line"></span><br><span class="line"># 质心坐标</span><br><span class="line">x_m = mean(x)</span><br><span class="line">y_m = mean(y)</span><br><span class="line"></span><br><span class="line">print(x_m,y_m)</span><br><span class="line"></span><br><span class="line">def calc_R(xc, yc):</span><br><span class="line"></span><br><span class="line">    return sqrt((x - xc) ** 2 + (y - yc) ** 2)</span><br><span class="line"></span><br><span class="line">def f_2(c):</span><br><span class="line">    Ri = calc_R(*c)</span><br><span class="line">    return Ri - Ri.mean()</span><br><span class="line"></span><br><span class="line">#圆心估计</span><br><span class="line">center_estimate = x_m, y_m</span><br><span class="line">center_2, _ = optimize.leastsq(f_2, center_estimate)</span><br><span class="line">xc_2, yc_2 = center_2</span><br><span class="line">Ri_2       = calc_R(xc_2, yc_2)</span><br><span class="line">#拟合圆的半径</span><br><span class="line">R_2        = Ri_2.mean()</span><br><span class="line">residu_2   = sum((Ri_2 - R_2)**2)</span><br><span class="line">residu2_2  = sum((Ri_2**2-R_2**2)**2)</span><br><span class="line"></span><br><span class="line">#输出结果</span><br><span class="line"></span><br><span class="line">print(&apos;center:&apos;, xc_2 , yc_2 , &apos;diameter:&apos;,R_2*2  , Ri_2.std() , residu_2 , residu2_2)</span><br><span class="line">##</span><br><span class="line">#####################################################################</span><br><span class="line">#输出图</span><br><span class="line">p.close(&apos;all&apos;)</span><br><span class="line"></span><br><span class="line">def plot_all(residu2=False):</span><br><span class="line"></span><br><span class="line">    p.figure(facecolor=&apos;white&apos;)  # figsize=(7, 5.4), dpi=72,</span><br><span class="line">    p.axis(&apos;equal&apos;)</span><br><span class="line"></span><br><span class="line">    theta_fit = linspace(-pi, pi, 180)</span><br><span class="line"></span><br><span class="line">    x_fit2 = xc_2 + R_2 * cos(theta_fit)</span><br><span class="line">    y_fit2 = yc_2 + R_2 * sin(theta_fit)</span><br><span class="line">    p.plot(x_fit2, y_fit2, &apos;k--&apos;, label=method_2, lw=2)</span><br><span class="line"></span><br><span class="line">    p.plot([xc_2], [yc_2], &apos;gD&apos;, mec=&apos;r&apos;, mew=1)</span><br><span class="line"></span><br><span class="line">    # draw</span><br><span class="line">    p.xlabel(&apos;x&apos;)</span><br><span class="line">    p.ylabel(&apos;y&apos;)</span><br><span class="line"></span><br><span class="line">    # 数据</span><br><span class="line">    p.plot(x, y, &apos;ro&apos;, label=&apos;data&apos;, ms=8, mec=&apos;b&apos;, mew=1)</span><br><span class="line">    p.legend(loc=&apos;best&apos;, labelspacing=0.1)</span><br><span class="line"></span><br><span class="line">    #标题</span><br><span class="line">    # p.grid()</span><br><span class="line">    p.title(&apos;Least Squares Circle&apos;)</span><br><span class="line"></span><br><span class="line">    p.savefig(&apos;%s_residu%d.png&apos; % (basename, 2 if residu2 else 1))</span><br><span class="line"></span><br><span class="line"># plot_all(residu2=False)</span><br><span class="line">plot_all(residu2=True )</span><br><span class="line"></span><br><span class="line">p.show()</span><br></pre></td></tr></table></figure>
<h2 id="3点法计算圆的半径"><a href="#3点法计算圆的半径" class="headerlink" title="3点法计算圆的半径"></a>3点法计算圆的半径</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line"># -*- coding: cp936 -*-</span><br><span class="line">import numpy as np</span><br><span class="line">import math</span><br><span class="line"></span><br><span class="line">##三点法计算圆的半径，圆上三点坐标[x1,y1,x2,y2,x3,y3]</span><br><span class="line">def calculate_radius(points):</span><br><span class="line">    x1 = points[0]</span><br><span class="line">    x2 = points[2]</span><br><span class="line">    x3 = points[4]</span><br><span class="line">    y1 = points[1]</span><br><span class="line">    y2 = points[3]</span><br><span class="line">    y3 = points[5]</span><br><span class="line">    a = x1 - x2</span><br><span class="line">    b = y1 - y2</span><br><span class="line">    c = x1 - x3</span><br><span class="line">    d = y1 - y3</span><br><span class="line">    e = ((x1 * x1 - x2 * x2) + (y1 * y1 - y2 * y2)) / 2.0</span><br><span class="line">    f = ((x1 * x1 - x3 * x3) + (y1 * y1 - y3 * y3)) / 2.0</span><br><span class="line">    det = b * c - a * d</span><br><span class="line">    if math.fabs(det) &lt; 0.00001:</span><br><span class="line">        return -1</span><br><span class="line">    x0 = -(d * e - b * f) / det</span><br><span class="line">    y0 = -(a * f - c * e) / det</span><br><span class="line">    radius = math.hypot(x1 - x0, y1 - y0)</span><br><span class="line">    return radius</span><br><span class="line"></span><br><span class="line">radius= calculate_radius([-43.1316,300.437,-34.5907,293.8275,-11.6362,303.9797])</span><br><span class="line"></span><br><span class="line">print(radius)</span><br></pre></td></tr></table></figure>
