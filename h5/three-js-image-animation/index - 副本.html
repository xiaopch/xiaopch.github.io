<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>基于Three.js的图片撕碎切换动画DEMO演示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="three-container"></div>
<div id="instructions">
  <div style="text-align:center;clear:both;">
    <script src="/statics.js" type="text/javascript"></script>
  </div>
</div>
<script src='three.min.js'></script>
<script src='TweenMax.min.js'></script>
<script src='bas.js'></script>
<script src='OrbitControls-2.js'></script>
<script>
// 以下是script.js的内容，包括优化后的图片加载代码
window.onload = init;
console.ward = function() {}; // what warnings?

function init() {
  var root = new THREERoot({
    createCameraControls: !true,
    antialias: (window.devicePixelRatio === 1),
    fov: 80
  });

  root.renderer.setClearColor(0x000000, 0);
  root.renderer.setPixelRatio(window.devicePixelRatio || 1);
  root.camera.position.set(0, 0, 60);

  var width = 100;
  var height = 60;

  var slide = new Slide(width, height, 'out');
  var l1 = new THREE.ImageLoader();
  l1.setCrossOrigin('Anonymous');
  l1.load('images/winter.jpg', function(img) {
    slide.setImage(img);
  }, undefined, function(error) {
    console.error('Error loading winter.jpg:', error);
  });
  root.scene.add(slide);

  var slide2 = new Slide(width, height, 'in');
  var l2 = new THREE.ImageLoader();
  l2.setCrossOrigin('Anonymous');
  l2.load('images/spring.jpg', function(img) {
    slide2.setImage(img);
  }, undefined, function(error) {
    console.error('Error loading spring.jpg:', error);
  });
  
  root.scene.add(slide2);

  var tl = new TimelineMax({repeat:-1, repeatDelay:1.0, yoyo: true});

  tl.add(slide.transition(), 0);
  tl.add(slide2.transition(), 0);

  createTweenScrubber(tl);

  window.addEventListener('keyup', function(e) {
    if (e.keyCode === 80) {
      tl.paused(!tl.paused());
    }
  });
}

// utils函数定义...

// createTweenScrubber函数定义...
</script>
</body>
</html>
